!
!
!
!

!
version 12.4
service timestamps debug datetime msec
service timestamps log datetime msec
no service password-encryption
!
hostname R1
!
boot-start-marker
boot-end-marker
!
!
no aaa new-model
memory-size iomem 5
no ip icmp rate-limit unreachable
ip cef
!
!
!
!
no ip domain lookup
!
multilink bundle-name authenticated
!
!
!
!
!
!
!
!
!
!
!
!
!
!
!
!
!
!
!
!
!
archive
 log config
  hidekeys
! 
!
!
!
ip tcp synwait-time 5
!
!
!
!
interface FastEthernet0/0
 description TRUNK_A_SWITCH2
 no ip address
 duplex auto
 speed auto
!
interface FastEthernet0/0.30
 description VLAN30_ATENCION_CLIENTE
 encapsulation dot1Q 30
 ip address 192.168.50.33 255.255.255.248
!
interface FastEthernet0/0.40
 description VLAN40_RECURSOS_HUMANOS
 encapsulation dot1Q 40
 ip address 192.168.50.41 255.255.255.248
!
interface FastEthernet0/0.50
 description VLAN50_CONTABILIDAD
 encapsulation dot1Q 50
 ip address 192.168.50.49 255.255.255.248
!
interface FastEthernet0/0.70
 description VLAN70_RECEPCION
 encapsulation dot1Q 70
 ip address 192.168.50.65 255.255.255.248
!
interface FastEthernet0/0.110
 description VLAN110_SALA_REUNIONES
 encapsulation dot1Q 110
 ip address 192.168.50.97 255.255.255.252
!
interface FastEthernet0/1
 description TRUNK_A_SWITCH3
 no ip address
 duplex auto
 speed auto
!
interface FastEthernet0/1.60
 description VLAN60_GERENCIA
 encapsulation dot1Q 60
 ip address 192.168.50.57 255.255.255.248
!
interface FastEthernet0/1.80
 description VLAN80_SERVIDORES
 encapsulation dot1Q 80
 ip address 192.168.50.73 255.255.255.248
!
interface FastEthernet0/1.90
 description VLAN90_OFICINA_IT
 encapsulation dot1Q 90
 ip address 192.168.50.81 255.255.255.248
!
interface FastEthernet0/1.100
 description VLAN100_SOPORTE_TECNICO
 encapsulation dot1Q 100
 ip address 192.168.50.89 255.255.255.248
!
interface FastEthernet0/1.120
 description VLAN120_SALA_JUNTAS
 encapsulation dot1Q 120
 ip address 192.168.50.101 255.255.255.252
!
interface FastEthernet1/0
 description TRUNK_A_SWITCH1
 no ip address
 duplex auto
 speed auto
!
interface FastEthernet1/0.10
 description VLAN10_VENTAS
 encapsulation dot1Q 10
 ip address 192.168.50.1 255.255.255.240
!
interface FastEthernet1/0.20
 description VLAN20_ADMINISTRACION
 encapsulation dot1Q 20
 ip address 192.168.50.17 255.255.255.240
!
router ospf 1
 router-id 1.1.1.1
 log-adjacency-changes
 passive-interface default
 network 192.168.50.0 0.0.0.15 area 0
 network 192.168.50.16 0.0.0.15 area 0
 network 192.168.50.32 0.0.0.7 area 0
 network 192.168.50.40 0.0.0.7 area 0
 network 192.168.50.48 0.0.0.7 area 0
 network 192.168.50.56 0.0.0.7 area 0
 network 192.168.50.64 0.0.0.7 area 0
 network 192.168.50.72 0.0.0.7 area 0
 network 192.168.50.80 0.0.0.7 area 0
 network 192.168.50.88 0.0.0.7 area 0
 network 192.168.50.96 0.0.0.3 area 0
 network 192.168.50.100 0.0.0.3 area 0
!
ip forward-protocol nd
!
!
no ip http server
no ip http secure-server
!
no cdp log mismatch duplex
!
!
!
!
!
!
control-plane
!
!
!
!
!
!
!
!
!
!
line con 0
 exec-timeout 0 0
 privilege level 15
 logging synchronous
line aux 0
 exec-timeout 0 0
 privilege level 15
 logging synchronous
line vty 0 4
 login
!
!
end
